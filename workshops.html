<!DOCTYPE html>
<html class="dark" lang="id">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Kicau Service | Workshops</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Montserrat:wght@600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script>
tailwind.config = { darkMode:"class", theme:{ extend:{
  colors:{ "surface":"#121415","background":"#121415","on-background":"#e2e2e3","on-surface":"#e2e2e3","on-surface-variant":"#bccbb4","surface-container-low":"#1a1c1d","surface-container":"#1e2021","surface-container-high":"#282a2b","outline":"#869580","outline-variant":"#3d4a39","primary":"#55ea4d","on-primary":"#003a03","primary-fixed-dim":"#4ce346","error":"#ffb4ab" },
  fontFamily:{ "body-md":["Inter"],"headline-md":["Montserrat"],"headline-lg":["Montserrat"] }
}}}
</script>
<style>
.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;}
.glass-panel{background:rgba(26,28,29,0.75);backdrop-filter:blur(12px);border:1px solid rgba(63,63,65,0.5);}
.mech-border{border:1px solid #3F3F41;}
.hover-glow:hover{box-shadow:0 0 15px rgba(85,234,77,0.3);border-color:#55ea4d;}
.leaflet-popup-content-wrapper,.leaflet-popup-tip{background:#1e2021;color:#e2e2e3;border:1px solid #3F3F41;}
.leaflet-container{background:#1a1c1d;}
</style>
</head>
<body class="bg-background text-on-background min-h-screen">
<nav class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-6 h-16 bg-surface border-b border-outline-variant">
  <div class="flex items-center gap-4">
    <span class="text-xl font-bold text-primary cursor-pointer" onclick="window.location.href='index.html'">Kicau Service</span>
  </div>
  <div id="nav-links-container" class="hidden md:flex items-center gap-6"></div>
  <div id="nav-auth-container" class="flex items-center gap-4"></div>
</nav>

<main class="pt-24 pb-12 max-w-7xl mx-auto px-4 md:px-16">
  <div class="mb-6">
    <h1 class="text-2xl font-bold uppercase tracking-wide">Bengkel Terdekat</h1>
    <p class="text-xs text-on-surface-variant mt-1">Peta interaktif, daftar bengkel, layanan & navigasi langsung ke Google Maps.</p>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
    <div class="lg:col-span-7">
      <div class="glass-panel mech-border rounded overflow-hidden">
        <div id="ws-map" style="height: 520px; width:100%;"></div>
      </div>
    </div>

    <div class="lg:col-span-5 space-y-4">
      <input type="text" id="ws-search" placeholder="Cari bengkel..." 
        class="w-full bg-surface-container-high border border-outline-variant rounded px-4 py-2.5 text-sm focus:outline-none focus:ring-1 focus:ring-primary"/>
      <div id="ws-list" class="space-y-3 max-h-[460px] overflow-y-auto pr-1"></div>
    </div>
  </div>
</main>

<!-- Detail Modal -->
<div id="ws-modal" class="hidden fixed inset-0 z-[60] bg-black/70 flex items-center justify-center p-4">
  <div class="glass-panel mech-border rounded max-w-lg w-full p-6">
    <div class="flex items-center justify-between mb-4 pb-3 border-b border-outline-variant">
      <h3 id="ws-modal-title" class="text-lg font-bold uppercase tracking-wide flex items-center gap-2">
        <span class="material-symbols-outlined text-primary">build</span> Detail Layanan
      </h3>
      <button onclick="tutupWsModal()" class="text-on-surface-variant hover:text-primary"><span class="material-symbols-outlined">close</span></button>
    </div>
    <div id="ws-modal-body" class="space-y-4 text-sm"></div>
  </div>
</div>

<div id="toast-container" class="fixed bottom-5 right-5 z-50 flex flex-col gap-3"></div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="js/workshops.js"></script>
<script>cekOtorisasiSesi(); initWorkshops();</script>
</body>
</html>
