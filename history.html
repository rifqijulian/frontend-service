<!DOCTYPE html>
<html class="dark" lang="id">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>AutoPro Service | History</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Montserrat:wght@600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script>
tailwind.config = { darkMode:"class", theme:{ extend:{
  colors:{ "surface":"#121415","background":"#121415","on-background":"#e2e2e3","on-surface":"#e2e2e3","on-surface-variant":"#bccbb4","surface-container-low":"#1a1c1d","surface-container":"#1e2021","surface-container-high":"#282a2b","outline":"#869580","outline-variant":"#3d4a39","primary":"#55ea4d","on-primary":"#003a03","primary-fixed-dim":"#4ce346","error":"#ffb4ab","error-container":"#93000a" },
  fontFamily:{ "body-md":["Inter"],"headline-md":["Montserrat"],"headline-lg":["Montserrat"] }
}}}
</script>
<style>
.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;}
.glass-panel{background:rgba(26,28,29,0.75);backdrop-filter:blur(12px);border:1px solid rgba(63,63,65,0.5);}
.mech-border{border:1px solid #3F3F41;}
.hover-glow:hover{box-shadow:0 0 15px rgba(85,234,77,0.3);border-color:#55ea4d;}
</style>
</head>
<body class="bg-background text-on-background min-h-screen">
<nav class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-6 h-16 bg-surface border-b border-outline-variant">
  <div class="flex items-center gap-4">
    <span class="text-xl font-bold text-primary cursor-pointer" onclick="window.location.href='index.html'">AutoPro Service</span>
  </div>
  <div id="nav-links-container" class="hidden md:flex items-center gap-6"></div>
  <div id="nav-auth-container" class="flex items-center gap-4"></div>
</nav>

<main class="pt-24 pb-12 max-w-7xl mx-auto px-4 md:px-16">
  <div class="flex flex-col sm:flex-row sm:items-end justify-between gap-4 mb-6">
    <div>
      <h1 class="text-2xl font-bold uppercase tracking-wide">Riwayat Servis</h1>
      <p class="text-xs text-on-surface-variant mt-1">Daftar lengkap catatan perawatan kendaraan Anda.</p>
    </div>
    <div class="flex flex-wrap gap-3 items-end">
      <div>
        <label class="block text-[10px] font-bold text-on-surface-variant uppercase tracking-wider mb-1">Dari</label>
        <input type="date" id="filter-dari" class="bg-surface-container-high border border-outline-variant rounded px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-primary"/>
      </div>
      <div>
        <label class="block text-[10px] font-bold text-on-surface-variant uppercase tracking-wider mb-1">Sampai</label>
        <input type="date" id="filter-sampai" class="bg-surface-container-high border border-outline-variant rounded px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-primary"/>
      </div>
      <button onclick="terapkanFilter()" class="bg-primary text-on-primary uppercase font-bold text-xs px-4 py-2 rounded hover-glow flex items-center gap-2">
        <span class="material-symbols-outlined text-base">filter_alt</span> Filter
      </button>
      <button onclick="resetFilter()" class="border border-outline text-on-surface uppercase font-bold text-xs px-3 py-2 rounded hover:bg-surface-container-high">Reset</button>
    </div>
  </div>

  <div class="glass-panel mech-border rounded overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full text-sm">
        <thead class="bg-surface-container-low text-[11px] uppercase text-on-surface-variant tracking-wider">
          <tr>
            <th class="text-left px-4 py-3">Tgl Servis</th>
            <th class="text-left px-4 py-3">Motor</th>
            <th class="text-left px-4 py-3">Plat</th>
            <th class="text-left px-4 py-3">Pekerjaan</th>
            <th class="text-left px-4 py-3">Biaya</th>
            <th class="text-left px-4 py-3">Jadwal Berikutnya</th>
            <th class="text-left px-4 py-3">Status</th>
            <th class="text-right px-4 py-3">Aksi</th>
          </tr>
        </thead>
        <tbody id="tbody-history"></tbody>
      </table>
    </div>
    <div id="history-empty" class="hidden p-12 text-center text-on-surface-variant text-sm">Tidak ada riwayat servis pada rentang tanggal ini.</div>
  </div>
</main>

<!-- Detail Modal -->
<div id="detail-modal" class="hidden fixed inset-0 z-50 bg-black/70 flex items-center justify-center p-4">
  <div class="glass-panel mech-border rounded max-w-lg w-full p-6">
    <div class="flex items-center justify-between mb-4 pb-3 border-b border-outline-variant">
      <h3 class="text-lg font-bold uppercase tracking-wide flex items-center gap-2"><span class="material-symbols-outlined text-primary">description</span> Detail Servis</h3>
      <button onclick="tutupDetail()" class="text-on-surface-variant hover:text-primary"><span class="material-symbols-outlined">close</span></button>
    </div>
    <div id="detail-body" class="space-y-3 text-sm"></div>
  </div>
</div>

<div id="toast-container" class="fixed bottom-5 right-5 z-50 flex flex-col gap-3"></div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/history.js"></script>
<script>cekOtorisasiSesi(); muatRiwayat();</script>
</body>
</html>
